<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Greater Vancouver Traffic Simulator</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/deck.gl@9.0.38/dist.min.js"></script>
<style>
  :root { --panel: rgba(17,23,31,.88); --line:#2b3a49; --ink:#e6edf4; --muted:#9fb0c0; }
  html,body { margin:0; height:100%; background:#0a0e13; font-family:system-ui,-apple-system,sans-serif; color:var(--ink); }
  #map { position:absolute; inset:0; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; backdrop-filter:blur(8px); }
  #title { position:absolute; top:12px; left:12px; z-index:5; padding:8px 13px; font-size:13px; }
  #title b { font-size:14px; } #title .sub { color:var(--muted); }
  #scenario { position:absolute; top:62px; left:12px; z-index:5; padding:8px 12px; font-size:13px; max-width:280px; }
  #scenario table { border-collapse:collapse; margin-top:6px; } #scenario td { padding:1px 0 1px 10px; }
  #scenario td:first-child { padding-left:0; color:var(--muted); }
  #legend { position:absolute; top:12px; right:12px; z-index:5; padding:10px 13px; font-size:12px; max-width:222px; }
  #legend h4 { margin:2px 0 6px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  #legend .row { display:flex; align-items:center; gap:7px; margin:3px 0; }
  #legend .row + h4 { margin-top:10px; }
  .sw { width:13px; height:13px; border-radius:3px; flex:none; }
  .swl { width:16px; height:3px; border-radius:2px; flex:none; }
  .ramp { height:9px; border-radius:3px; margin:4px 0 2px; }
  #panel { position:absolute; left:12px; right:12px; bottom:12px; z-index:5; padding:10px 14px;
           display:flex; align-items:center; gap:14px; }
  #panel button { background:#1f6feb; color:#fff; border:0; border-radius:6px; padding:7px 13px; cursor:pointer; font-size:14px; }
  #panel button:hover { background:#3b82f6; }
  #scrub { flex:1; accent-color:#3b82f6; }
  #clock { font-variant-numeric:tabular-nums; font-size:19px; min-width:96px; }
  #stat { font-size:12px; color:var(--muted); min-width:150px; text-align:right; }
  select { background:#0e141b; color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:6px; }
  .toggles { display:flex; gap:9px; font-size:12px; color:var(--muted); flex-wrap:wrap; }
  .toggles label { display:flex; align-items:center; gap:4px; cursor:pointer; }
  #loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:6; padding:14px 20px; }
</style>
</head>
<body>
<div id="map"></div>
<div id="title" class="card"><b>Greater Vancouver Traffic Simulator</b><br>
  <span class="sub">Downtown peninsula · <span id="runname">baseline</span> · <span id="vcount">0</span> vehicles</span></div>
<div id="scenario" class="card" style="display:none"></div>
<div id="legend" class="card"></div>
<div id="loading" class="card">Loading network, zones &amp; trace…</div>
<div id="panel" class="card">
  <button id="play">⏸ Pause</button>
  <span id="clock">07:00:00</span>
  <input id="scrub" type="range" min="0" max="100" value="0" />
  <label style="font-size:12px;color:var(--muted)">run <select id="scenario"></select></label>
  <label style="font-size:12px;color:var(--muted)">speed <select id="speed">
    <option value="15">15×</option><option value="30" selected>30×</option>
    <option value="60">60×</option><option value="120">120×</option></select></label>
  <span class="toggles" id="toggles"></span>
  <span id="stat">—</span>
</div>

<script type="module">
import * as Arrow from 'https://esm.sh/apache-arrow@17';

// ---- palettes ------------------------------------------------------------
const VCOL = { car:[42,150,245], bus:[255,142,28], truck:[150,92,60], rail:[200,70,200] };
const ZCOL = { residential:[122,176,134,70], commercial:[86,150,210,70], industrial:[201,160,109,80],
  parkland:[116,188,120,85], 'downtown-core':[170,128,202,80] };
const RCOL = { arterial:[64,76,92,230], collector:[110,124,140,170], local:[168,180,194,120] };
const RW   = { arterial:2.2, collector:1.1, local:0.5 };
const TRANSIT_COL = [188,120,52,95];
const SIGNAL_COL = [250,180,44];
const ZONE_LABELS = { 'downtown-core':'Downtown core', residential:'Residential', commercial:'Commercial',
  industrial:'Industrial', parkland:'Parkland' };
const LOD_Z = 13.2;   // < flow ribbons | ≥ icons
const SIG_Z = 14.8;   // ≥ : show live traffic-signal states
const css = c => `rgb(${c[0]},${c[1]},${c[2]})`;
const hms = sec => { const f=n=>String(Math.floor(n)).padStart(2,'0'); return `${f(sec/3600%24)}:${f(sec/60%60)}:${f(sec%60)}`; };
const volColor = v => { const x=Math.min(1, Math.sqrt((v||0)/180));
  return [Math.round(60+170*x), Math.round(160-110*x), Math.round(200-150*x), 215]; };
// congestion: stopped (red) -> moving (green); s in m/s
const congColor = s => { const x=Math.max(0,Math.min(1,(s||0)/11));
  return x<0.5 ? [235, Math.round(70+150*(x/0.5)), 55]
               : [Math.round(235-165*((x-0.5)/0.5)), Math.round(220-40*((x-0.5)/0.5)), Math.round(55+45*((x-0.5)/0.5))]; };
const sigColor = c => (c==='G'||c==='g') ? [40,200,90] : (c==='y'||c==='Y') ? [245,200,40] : (c==='r'||c==='R') ? [235,60,55] : [150,150,150];
const R=6371000, rad=Math.PI/180;
const distM = (a,b) => { const dLat=(b[1]-a[1])*rad, dLon=(b[0]-a[0])*rad, la=a[1]*rad, lb=b[1]*rad;
  const x=Math.sin(dLat/2)**2 + Math.cos(la)*Math.cos(lb)*Math.sin(dLon/2)**2; return 2*R*Math.asin(Math.min(1,Math.sqrt(x))); };

// ---- vehicle icon atlas (drawn on a canvas; tinted via mask) --------------
const CELL = 64;
function buildAtlas(){
  const cv=document.createElement('canvas'); cv.width=CELL*2; cv.height=CELL; const g=cv.getContext('2d'); g.fillStyle='#fff';
  g.beginPath(); g.roundRect(CELL/2-10, CELL/2-16, 20, 32, 6); g.fill();
  g.beginPath(); g.moveTo(CELL/2-7,CELL/2-14); g.lineTo(CELL/2+7,CELL/2-14); g.lineTo(CELL/2,CELL/2-23); g.closePath(); g.fill();
  g.beginPath(); g.roundRect(CELL+CELL/2-10, CELL/2-23, 20, 46, 4); g.fill();
  return cv.toDataURL();
}
const ATLAS_URL = buildAtlas();
const ATLAS_MAP = { car:{x:0,y:0,width:CELL,height:CELL,anchorX:CELL/2,anchorY:CELL/2,mask:true},
  bus:{x:CELL,y:0,width:CELL,height:CELL,anchorX:CELL/2,anchorY:CELL/2,mask:true} };

// ---- map -----------------------------------------------------------------
const Q = new URLSearchParams(location.search);
const Z0 = +Q.get('zoom') || 12.5;
const map = new maplibregl.Map({ container:'map', style:'https://tiles.openfreemap.org/styles/positron',
  center:[+Q.get('lng')||-123.115, +Q.get('lat')||49.283], zoom:Z0, pitch:0, attributionControl:false });
const overlay = new deck.MapboxOverlay({ interleaved:false, layers:[] });
map.addControl(overlay);

// ---- state ---------------------------------------------------------------
let T=+Q.get('t')||300, tMax=0, begin=25200, playing=Q.get('play')!=='0', speed=30, last=0, zoom=Z0;
let trips=[], zonesPoly=null, gateways=[], roads=null, transitGeo=null, volMap={}, vehicles=0;
let sigGroups=[], sigChangesMap={};
let runsList=[], closedEdge=null, scenarioInfo=null;
const show = { zones:true, roads:true, transit:true, vehicles:true, congestion:true, signals:true, labels:true };

init().catch(e => { const l=document.getElementById('loading'); if(l) l.textContent='init error: '+((e&&e.message)||e); console.error(e); });

async function loadRun(id){
  const [meta, t, vol, sig] = await Promise.all([
    fetch(`/api/runs/${id}/meta`).then(r=>r.json()),
    fetch(`/api/runs/${id}/trips?every=2`).then(r=>r.json()),
    fetch(`/api/runs/${id}/volumes`).then(r=>r.json()),
    fetch(`/api/runs/${id}/signals-live`).then(r=>r.ok?r.json():{pos:{},changes:{}}).catch(()=>({pos:{},changes:{}})),
  ]);
  begin = meta.params.begin ?? 25200; tMax = meta.stats.trajectory.t_max;
  vehicles = meta.stats.trajectory.vehicles; trips = t; volMap = vol;
  sigChangesMap = sig.changes || {};
  sigGroups = [];                                   // one indicator per approach (incoming edge)
  const sp = sig.pos || {}, se = sig.edges || {};
  for (const tls in se){
    const byEdge = {};
    (se[tls]||[]).forEach((e,i)=>{ if (e==null || !sp[tls] || !sp[tls][i]) return; (byEdge[e]=byEdge[e]||[]).push(i); });
    for (const e in byEdge){
      const idxs=byEdge[e]; let lon=0, lat=0;
      for (const i of idxs){ lon+=sp[tls][i][0]; lat+=sp[tls][i][1]; }
      sigGroups.push({ tls, idxs, position:[lon/idxs.length, lat/idxs.length] });
    }
  }
  for (const tr of trips){ tr.t0=tr.timestamps[0]; tr.tN=tr.timestamps[tr.timestamps.length-1]; }
  document.getElementById('vcount').textContent = vehicles.toLocaleString();
  document.getElementById('runname').textContent = meta.params.name ?? id;
  document.getElementById('scrub').max = tMax;

  // scenario compare (Phase 5): closed edge + before/after metrics vs a baseline run
  const p = meta.params || {}, mt = (meta.stats || {}).metrics;
  closedEdge = p.closure ? p.closure.edge : null;
  scenarioInfo = null;
  if (p.scenario && p.scenario !== 'baseline'){
    const base = runsList.find(r => r.params && r.params.scenario === 'baseline'
      && r.params.scale === p.scale && r.params.begin === p.begin && r.params.end === p.end);
    let bm = null;
    if (base) bm = ((await fetch(`/api/runs/${base.run_id}/meta`).then(r=>r.json())).stats || {}).metrics;
    scenarioInfo = { name:p.scenario, m:mt, bm };
  }
  renderScenario();
}

function renderScenario(){
  const el = document.getElementById('scenario');
  if (!scenarioInfo){ el.style.display='none'; return; }
  const { name, m, bm } = scenarioInfo;
  const bridge = name.replace(/^close_/, '').replace(/_/g, ' ');
  let html = `<b>Scenario:</b> <span style="color:#e25656">✕ ${bridge} closed</span>`;
  if (bm && m){
    const dcell = (a,b,suf) => { const x=a-b, s=x>=0?'+':'';
      return `<span style="color:${x>0?'#e25656':'#28c85a'}">${s}${x.toFixed(0)}${suf}</span>`; };
    const row = (lab,a,b,suf) => `<tr><td>${lab}</td><td style="text-align:right">${b.toFixed(0)}${suf}</td>`+
      `<td style="text-align:right">${a.toFixed(0)}${suf}</td><td style="text-align:right">${dcell(a,b,suf)}</td></tr>`;
    html += `<table><tr><td></td><td style="text-align:right;color:var(--muted)">base</td>`+
      `<td style="text-align:right;color:var(--muted)">closed</td><td style="text-align:right;color:var(--muted)">Δ</td></tr>`+
      row('avg travel', m.avg_duration, bm.avg_duration, 's') +
      row('avg wait', m.avg_wait, bm.avg_wait, 's') +
      row('trips done', m.completed, bm.completed, '') + `</table>`;
  }
  el.innerHTML = html; el.style.display='block';
}

async function init(){
  const [zones, net, transit, runs] = await Promise.all([
    fetch('/api/zones').then(r=>r.json()), fetch('/api/network').then(r=>r.json()),
    fetch('/api/transit').then(r=>r.json()), fetch('/api/runs').then(r=>r.json()),
  ]);
  roads=net; transitGeo=transit; runsList=runs;
  zonesPoly = { type:'FeatureCollection', features: zones.features.filter(f=>f.geometry.type!=='Point') };
  gateways = zones.features.filter(f=>f.properties.is_gateway);
  const sel = document.getElementById('scenario');
  sel.innerHTML = runs.map(r=>`<option value="${r.run_id}">${(r.params&&r.params.name)||('run '+r.run_id)}</option>`).join('');
  sel.onchange = async e => { await loadRun(+e.target.value); render(); };
  await loadRun(runs[0]?.run_id ?? 1);
  buildLegend(); buildToggles();
  document.getElementById('loading').remove();
  render(); requestAnimationFrame(tick);
}

// ---- interpolate each active vehicle (position, heading, speed) ----------
function interpAt(t){
  const out=[];
  for (const tr of trips){
    if (t<tr.t0 || t>tr.tN) continue;
    const ts=tr.timestamps, n=ts.length; let lo=0, hi=n-1;
    while (lo+1<hi){ const m=(lo+hi)>>1; if (ts[m]<=t) lo=m; else hi=m; }
    const a=tr.path[lo], b=tr.path[Math.min(lo+1,n-1)], dt=(ts[lo+1]-ts[lo])||1;
    const f=Math.max(0,Math.min(1,(t-ts[lo])/dt));
    const lon=a[0]+(b[0]-a[0])*f, lat=a[1]+(b[1]-a[1])*f;
    const dE=(b[0]-a[0])*Math.cos(lat*rad), dN=b[1]-a[1];
    out.push({ position:[lon,lat], angle:-((dE||dN)?Math.atan2(dE,dN)/rad:0), cls:tr.cls, speed:distM(a,b)/dt });
  }
  return out;
}

// ---- layers --------------------------------------------------------------
function layers(){
  const t=Math.min(tMax,T), flow=zoom<LOD_Z, L=[];
  if (show.zones){ const op = zoom>=15 ? 0.32 : zoom>=13.5 ? 0.6 : 1.0;
    L.push(new deck.GeoJsonLayer({ id:'zones', data:zonesPoly, filled:true, stroked:false, opacity:op,
      getFillColor:f=>ZCOL[f.properties.land_use]||[130,130,130,55], parameters:{depthTest:false} })); }
  if (show.roads) L.push(new deck.GeoJsonLayer({ id:'roads', data:roads, stroked:true, filled:false,
    getLineColor: flow ? f=>volColor(volMap[f.properties.id]) : f=>RCOL[f.properties.class]||RCOL.local,
    getLineWidth: flow ? f=>0.6+3.4*Math.min(1,(volMap[f.properties.id]||0)/120) : f=>(RW[f.properties.class]||0.5)*(zoom<12?0.6:1),
    lineWidthUnits:'pixels', lineWidthMinPixels:0.4, updateTriggers:{getLineColor:flow, getLineWidth:flow}, parameters:{depthTest:false} }));
  if (show.transit && transitGeo) L.push(new deck.GeoJsonLayer({ id:'transit', data:transitGeo, stroked:true, filled:false,
    getLineColor:TRANSIT_COL, getLineWidth:1, lineWidthUnits:'pixels', lineWidthMinPixels:0.7, parameters:{depthTest:false} }));
  if (closedEdge && roads){
    const f = roads.features.find(x=>x.properties.id===closedEdge);
    if (f){
      L.push(new deck.GeoJsonLayer({ id:'closed', data:{type:'FeatureCollection',features:[f]}, stroked:true, filled:false,
        getLineColor:[230,40,40], getLineWidth:5, lineWidthUnits:'pixels', lineWidthMinPixels:3, parameters:{depthTest:false} }));
      const cc=f.geometry.coordinates, mid=cc[Math.floor(cc.length/2)];
      L.push(new deck.TextLayer({ id:'closedlbl', data:[{position:mid}], getPosition:d=>d.position, getText:()=>'✕ closed',
        getSize:13, getColor:[200,30,30], background:true, getBackgroundColor:[255,255,255,225], backgroundPadding:[4,3], getPixelOffset:[0,-15], fontWeight:700 }));
    }
  }
  if (show.signals && zoom>=SIG_Z && sigGroups.length){
    const stateAt = ch => { if (!ch||!ch.length||ch[0][0]>t) return ch&&ch[0]?ch[0][1]:'';
      let lo=0,hi=ch.length-1,idx=0; while(lo<=hi){const m=(lo+hi)>>1; if(ch[m][0]<=t){idx=m;lo=m+1;}else hi=m-1;} return ch[idx][1]; };
    const data = sigGroups.map(g=>{
      const st = stateAt(sigChangesMap[g.tls]); let col='r';   // approach is green if any movement is green, else yellow, else red
      for (const i of g.idxs){ const c=st[i]||'r'; if (c==='G'||c==='g'){ col='G'; break; } if ((c==='y'||c==='Y') && col==='r') col='y'; }
      return { position:g.position, color:sigColor(col) };
    });
    L.push(new deck.ScatterplotLayer({ id:'sig', data, getPosition:d=>d.position, getFillColor:d=>d.color,
      getRadius:5, radiusUnits:'meters', radiusMinPixels:2.6, radiusMaxPixels:9,
      stroked:true, getLineColor:[255,255,255,230], lineWidthUnits:'pixels', getLineWidth:1,
      lineWidthMinPixels:0.5, lineWidthMaxPixels:1.5, updateTriggers:{getFillColor:t} }));
  }
  if (show.trails && !flow) L.push(new deck.TripsLayer({ id:'trips', data:trips, getPath:d=>d.path, getTimestamps:d=>d.timestamps,
    getColor:d=>VCOL[d.cls]||[150,150,150], currentTime:t, trailLength:8, fadeTrail:true, widthUnits:'pixels', getWidth:1, widthMinPixels:1, opacity:0.6 }));
  let nActive=0;
  if (show.vehicles && !flow){
    const data=interpAt(t); nActive=data.length;
    L.push(new deck.IconLayer({ id:'veh', data, iconAtlas:ATLAS_URL, iconMapping:ATLAS_MAP, billboard:false,
      getIcon:d=>d.cls==='bus'?'bus':'car', getPosition:d=>d.position,
      getColor:d=> show.congestion ? congColor(d.speed) : (VCOL[d.cls]||[120,120,120]),
      getAngle:d=>d.angle, getSize:d=>d.cls==='bus'?24:15, sizeUnits:'pixels', sizeMinPixels:6,
      alphaCutoff:0.05, updateTriggers:{getColor:show.congestion}, parameters:{depthTest:false} }));
  }
  if (show.labels){
    L.push(new deck.ScatterplotLayer({ id:'gw', data:gateways, getPosition:f=>f.geometry.coordinates,
      getFillColor:[226,86,86], getRadius:5, radiusUnits:'pixels', stroked:true, getLineColor:[255,255,255], lineWidthMinPixels:1.5 }));
    L.push(new deck.TextLayer({ id:'gwl', data:gateways, getPosition:f=>f.geometry.coordinates, getText:f=>f.properties.name||'',
      getSize:11, getColor:[40,46,54], getPixelOffset:[0,-12], background:true, getBackgroundColor:[255,255,255,205], backgroundPadding:[4,2], fontWeight:600 }));
  }
  document.getElementById('stat').textContent = flow ? 'flow view · busier = redder · zoom in for vehicles'
    : `${nActive} on-road · t+${Math.floor(T)}s`;
  return L;
}
function render(){ overlay.setProps({ layers: layers() });
  document.getElementById('clock').textContent = hms(begin + T);
  document.getElementById('scrub').value = Math.floor(T); }
function tick(now){ if (playing && last){ T += (now-last)/1000*speed; if (T>=tMax) T=0; render(); } last=now; requestAnimationFrame(tick); }
map.on('zoom', () => { zoom = map.getZoom(); if (!playing) render(); });

// ---- legend + toggles ----------------------------------------------------
function buildLegend(){
  const zon = Object.keys(ZONE_LABELS).map(k=>`<div class="row"><span class="sw" style="background:${css(ZCOL[k])}"></span>${ZONE_LABELS[k]}</div>`).join('');
  document.getElementById('legend').innerHTML =
    `<h4>Vehicles (street zoom)</h4>`+
    `<div class="ramp" style="background:linear-gradient(90deg,${css(congColor(0))},${css(congColor(5.5))},${css(congColor(11))})"></div>`+
    `<div class="row" style="justify-content:space-between;color:var(--muted)"><span>stopped</span><span>moving</span></div>`+
    `<div class="row" style="color:var(--muted);margin-top:2px">shape: ▮ car · ▬ bus</div>`+
    `<div class="row" style="color:var(--muted)"><span style="color:#28c85a">●</span><span style="color:#f5c828">●</span><span style="color:#eb3c37">●</span> live signals (zoom in)</div>`+
    `<h4>Road flow (zoomed out)</h4>`+
    `<div class="ramp" style="background:linear-gradient(90deg,${css(volColor(0))},${css(volColor(60))},${css(volColor(180))})"></div>`+
    `<div class="row" style="justify-content:space-between;color:var(--muted)"><span>quiet</span><span>busy</span></div>`+
    `<h4>Land use</h4>${zon}`+
    `<div class="row" style="margin-top:8px"><span class="swl" style="background:${css(TRANSIT_COL)}"></span>bus routes</div>`+
    `<div class="row"><span style="color:#e25656">●</span> bridge gateways</div>`;
}
function buildToggles(){
  document.getElementById('toggles').innerHTML = Object.keys(show)
    .map(k=>`<label><input type="checkbox" data-k="${k}" ${show[k]?'checked':''}>${k}</label>`).join('');
  document.querySelectorAll('#toggles input').forEach(cb => cb.onchange = e => { show[e.target.dataset.k]=e.target.checked; render(); });
}

// ---- controls ------------------------------------------------------------
document.getElementById('play').onclick = e => { playing=!playing; e.target.textContent=playing?'⏸ Pause':'▶ Play'; last=0; };
document.getElementById('scrub').oninput = e => { T=+e.target.value; render(); };
document.getElementById('speed').onchange = e => { speed=+e.target.value; };
</script>
</body>
</html>
